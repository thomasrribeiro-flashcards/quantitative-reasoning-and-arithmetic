<title id='title'>Double number line for a cocoa and sugar mixture</title>
<desc id='desc'>Two horizontal number lines with their zeros aligned. The top line, labeled cocoa, is marked 0, 2, 4, 6, 8. The bottom line, labeled sugar, is marked 0, 3, 6, 9, 12. Dashed vertical guides link each cocoa mark to the sugar mark directly below it.</desc>
