<title id='title'>Double number line for a bead bracelet with one missing value</title>
<desc id='desc'>Two horizontal number lines with their zeros aligned. The top line, labeled silver, is marked 0, 2, 4, 6, 8. The bottom line, labeled wooden, is marked 0, 5, 10, question mark, 20. Dashed vertical guides link each aligned pair of marks; the question mark sits directly below the 6 on the silver line.</desc>
