<title id='title'>Equal-value exchange between twelve ones and one ten with two ones</title>
<desc id='desc'>On the left, twelve loose counters in rows. On the right, one outlined loop encloses ten counters and two loose counters sit beside it. A double-headed arrow labeled same quantity connects the two sides.</desc>
