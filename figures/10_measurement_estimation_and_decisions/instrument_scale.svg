<title id='title'>Ruler scale with two pointer arrows</title>
<desc id='desc'>A horizontal measuring scale from zero to six with a longer labeled mark at every whole centimeter and ten equal small steps between neighboring labeled marks. Two arrows above the scale, labeled A and B, each point down at the scale: A at one of the labeled marks and B between two labeled marks.</desc>
