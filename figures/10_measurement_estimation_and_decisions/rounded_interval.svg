<title id='title'>Rounded-value interval band on a centimeter line</title>
<desc id='desc'>A number line from five to seven with a longer labeled mark at each whole centimeter and small steps at tenths between them. A dot sits on the mark at six, and a shaded band along the line surrounds the dot, stretching partway toward five on the left and partway toward seven on the right.</desc>
