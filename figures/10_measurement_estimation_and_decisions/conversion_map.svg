<title id='title'>Kilometer and meter conversion map</title>
<desc id='desc'>Two horizontal lines with zeros aligned at the left. The upper line has labeled marks at zero, one, two, and three kilometers; the lower line has labeled marks at zero, one thousand, two thousand, and three thousand meters. Dashed vertical guides join each kilometer mark to the meter mark directly below it, and a dot on the upper line between the two and three kilometer marks has a dashed guide leading down to a question mark on the lower line.</desc>
