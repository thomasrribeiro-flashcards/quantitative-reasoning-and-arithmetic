<title id='title'>A dot on a number line between 0 and 1</title>
<desc id='desc'>A horizontal number line with arrowheads on both ends. Tall marks labeled 0 and 1 bound the middle of the line, shorter equally spaced marks cut the space between them into equal steps, and a round dot sits on one of the marks between 0 and 1.</desc>
