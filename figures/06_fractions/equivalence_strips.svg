<title id='title'>Three equal-length strips cut into halves, fourths, and sixths</title>
<desc id='desc'>Three stacked horizontal strips of identical length, labeled halves, fourths, and sixths on the left. The top strip is cut into two equal parts and its left part is shaded with a pale tint and diagonal hatching; the middle strip is cut into four equal parts; the bottom strip is cut into six equal parts. A dashed vertical guide drops from the right edge of the shaded half through all three strips.</desc>
