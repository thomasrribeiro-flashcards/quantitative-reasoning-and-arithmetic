<title id='title'>Before and after membership bars</title>
<desc id='desc'>Two horizontal bars sharing a common left edge. The upper bar is labeled before, 40 members. The lower bar is longer and labeled after, 50 members. A dashed vertical line rises where the before bar ends, and the piece of the after bar beyond that line is shaded differently.</desc>
