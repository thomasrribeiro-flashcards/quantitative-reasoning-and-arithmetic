<title id='title'>Number line extended left of zero with one marked dot</title>
<desc id='desc'>A horizontal number line with arrowheads on both ends. Marks are evenly spaced; the marks at 0, 1, 2, 3, 4, and 5 are labeled, and five equally spaced marks continue to the left of zero without labels. A single round dot sits on one of the unlabeled marks left of zero.</desc>
