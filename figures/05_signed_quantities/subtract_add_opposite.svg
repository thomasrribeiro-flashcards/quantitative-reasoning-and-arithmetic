<title id='title'>Subtracting five and adding negative five shown as the same leftward jump</title>
<desc id='desc'>Two identical horizontal number lines stacked vertically. On each line, marks are evenly spaced with 0 and 3 labeled, a round dot sits on the mark at 3, and a curved arrow jumps five marks leftward from the dot to a mark labeled with a question mark. The top line is captioned three minus five and the bottom line is captioned three plus negative five.</desc>
