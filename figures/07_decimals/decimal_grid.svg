<title id='title'>A hundred grid with some squares shaded</title>
<desc id='desc'>A large square divided into ten rows of ten equal small squares. The top two rows are fully shaded with a pale tint and diagonal hatching, along with the first seven squares of the third row; the remaining squares are plain.</desc>
