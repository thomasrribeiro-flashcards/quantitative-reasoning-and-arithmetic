<title id='title'>Two column setups of the same decimal addition</title>
<desc id='desc'>Two column-form setups of the decimal addition four point six plus zero point eight five, labeled A and B. In layout A the final digits of the two numbers are flush right, so the six sits above the five. In layout B the decimal points sit directly above one another, so the six sits above the eight. Each layout shows a plus sign beside the lower number and a horizontal answer line below it.</desc>
