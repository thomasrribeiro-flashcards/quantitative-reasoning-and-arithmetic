<title id='title'>A dot on a number line between 3 and 4</title>
<desc id='desc'>A horizontal number line with arrowheads on both ends. Tall marks labeled 3 and 4 bound the middle of the line, shorter equally spaced marks cut the space between them into ten equal steps, and a round dot sits on one of the marks between 3 and 4.</desc>
