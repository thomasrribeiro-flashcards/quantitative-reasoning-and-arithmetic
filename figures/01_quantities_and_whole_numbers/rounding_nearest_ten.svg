<title id='title'>Number line stretch from 30 to 40 with a dot on 38</title>
<desc id='desc'>The stretch of a number line from 30 to 40 with a mark at every whole number. The end marks are labeled 30 and 40, a dashed vertical guide marks the halfway value labeled 35, and a round dot labeled 38 sits on the mark two steps left of 40.</desc>
